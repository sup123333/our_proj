# База данных — в проде значения приходят из переменных окружения, дефолты только для локальной разработки
# DB_URL можно задать целиком (Railway/VPS), либо собрать из частей DB_HOST/DB_PORT/DB_NAME (так отдаёт Render managed Postgres)
spring.datasource.url=${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:tarot_db}}
spring.datasource.username=${DB_USERNAME:tarot_user}
spring.datasource.password=${DB_PASSWORD:change_me}
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=false

# JWT — секрет ОБЯЗАТЕЛЬНО переопределить через env переменную JWT_SECRET в проде (минимум 32 байта, иначе старт упадёт)
jwt.secret=${JWT_SECRET:tarot-super-secret-key-change-this-please-32chars}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Email таролога (будет иметь ADMIN права)
admin.email=${ADMIN_EMAIL:tarot@example.com}

# CORS — список разрешённых origin через запятую, на проде задать реальным доменом
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Баллы/скидки/статусы — настраиваемая бизнес-логика лояльности
loyalty.points-per-session=${LOYALTY_POINTS_PER_SESSION:10}
loyalty.points-for-discount=${LOYALTY_POINTS_FOR_DISCOUNT:50}
loyalty.discount-percent=${LOYALTY_DISCOUNT_PERCENT:15}
loyalty.regular-status-threshold=${LOYALTY_REGULAR_THRESHOLD:3}
loyalty.vip-status-threshold=${LOYALTY_VIP_THRESHOLD:10}

# Rate limit на публичных неаутентифицированных эндпоинтах (брутфорс логина, спам лидов с лендинга)
ratelimit.auth.max-requests=${RATELIMIT_AUTH_MAX:5}
ratelimit.auth.window-seconds=${RATELIMIT_AUTH_WINDOW_SECONDS:60}
ratelimit.protected-paths=${RATELIMIT_PROTECTED_PATHS:/api/auth/,/api/leads}

server.port=${PORT:${SERVER_PORT:8080}}
